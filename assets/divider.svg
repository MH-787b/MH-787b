<svg width="1200" height="30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="100" y1="15" x2="1100" y2="15" stroke="url(#divGrad)" stroke-width="1" filter="url(#glow)">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </line>
  <!-- Animated dot traveling along the line -->
  <circle r="3" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="cx" values="100;1100;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="15;15;15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#888888" filter="url(#glow)">
    <animate attributeName="cx" values="1100;100;1100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="15;15;15" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Rotating diamond -->
  <polygon points="600,8 607,15 600,22 593,15" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 600 15" to="360 600 15" dur="6s" repeatCount="indefinite"/>
  </polygon>
</svg>