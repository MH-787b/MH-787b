<svg width="1200" height="120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="50%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </linearGradient>
    <linearGradient id="footNeon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#cccccc;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="footGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
    <pattern id="footGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="120" fill="url(#footGrad)"/>
  <rect width="1200" height="120" fill="url(#footGrid)"/>

  <!-- Top border -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#footNeon)" stroke-width="2">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Animated text -->
  <text x="600" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" opacity="0.6" letter-spacing="6">
    EOF
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="75" text-anchor="middle" font-family="monospace" font-size="11" fill="#888888" opacity="0.4" letter-spacing="3">
    [ --- ]
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="4s" repeatCount="indefinite"/>
  </text>

  <!-- Decorative corners -->
  <g stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.3">
    <polyline points="20,10 10,10 10,30"/>
    <polyline points="1180,10 1190,10 1190,30"/>
    <polyline points="20,110 10,110 10,90"/>
    <polyline points="1180,110 1190,110 1190,90"/>
  </g>

  <!-- Scanning line -->
  <rect x="0" y="0" width="1200" height="2" fill="#ffffff" opacity="0.2">
    <animate attributeName="y" values="0;118;0" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.05;0.25;0.05" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom line -->
  <line x1="0" y1="119" x2="1200" y2="119" stroke="#555555" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
  </line>
</svg>